<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Gym Tracker</title>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #f0f0f2;
    --border: #e0e0e5;
    --text: #1a1a1e;
    --text2: #6e6e7a;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --danger: #dc2626;
    --danger-light: #fee2e2;
    --success: #16a34a;
    --success-light: #dcfce7;
    --nav-h: 64px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f13;
      --surface: #1c1c22;
      --surface2: #26262e;
      --border: #3a3a44;
      --text: #f0f0f5;
      --text2: #9090a0;
      --accent: #3b82f6;
      --accent-light: #1e3a5f;
      --danger: #f87171;
      --danger-light: #3b1212;
      --success: #4ade80;
      --success-light: #0f2a18;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.5; overflow: hidden;
  }
  #app { display: flex; flex-direction: column; height: 100%; max-width: 600px; margin: 0 auto; }
  .screen {
    display: none; flex: 1; overflow-y: auto;
    padding: 16px 16px calc(var(--nav-h) + var(--safe-bottom) + 16px);
    -webkit-overflow-scrolling: touch;
  }
  .screen.active { display: block; }

  /* NAV */
  #nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 600px; height: calc(var(--nav-h) + var(--safe-bottom));
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; padding-bottom: var(--safe-bottom); z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; background: none; border: none; color: var(--text2);
    font-size: 11px; font-weight: 500; cursor: pointer; padding: 8px 4px; min-height: 44px; transition: color 0.15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* TYPE */
  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
  h2 { font-size: 18px; font-weight: 600; }
  h3 { font-size: 16px; font-weight: 600; }
  .screen-header { margin-bottom: 20px; padding-top: 12px; }
  .screen-header p { color: var(--text2); font-size: 14px; }

  /* CARD */
  .card { background: var(--surface); border-radius: 14px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); }
  .card-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 0 16px; height: 44px; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { opacity: 0.75; transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost { background: transparent; color: var(--accent); padding: 0 8px; height: 36px; font-size: 14px; font-weight: 500; }
  .btn-icon {
    width: 36px; height: 36px; border-radius: 8px; padding: 0;
    background: var(--surface2); color: var(--text2); border: 1px solid var(--border);
    cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px; transition: opacity 0.15s;
  }
  .btn-icon:active { opacity: 0.6; }
  .btn-full { width: 100%; }

  /* FORMS */
  input, textarea, select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; font-size: 16px; color: var(--text); width: 100%;
    outline: none; font-family: inherit; transition: border-color 0.15s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 4px; }

  /* BADGE */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; background: var(--accent-light); color: var(--accent); }
  .badge-rest { background: var(--surface2); color: var(--text2); }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 12px 0; }

  /* TAGS */
  .tag { display: inline-flex; align-items: center; gap: 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; font-size: 14px; color: var(--text); }
  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

  /* SET ROW */
  .set-row { display: grid; grid-template-columns: 32px 1fr 1fr 1fr 36px; gap: 6px; align-items: center; margin-bottom: 8px; }
  .set-num { font-size: 13px; font-weight: 600; color: var(--text2); text-align: center; }
  .set-row input { font-size: 15px; text-align: center; padding: 8px 6px; }
  .set-row .note-input { grid-column: 2 / 5; font-size: 14px; padding: 6px 10px; text-align: left; }

  /* HISTORY */
  .history-item { cursor: pointer; }
  .history-item .meta { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .history-detail { display: none; margin-top: 12px; }
  .history-detail.open { display: block; }
  .exercise-block { margin-bottom: 12px; }
  .exercise-block h4 { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .set-log-row { display: grid; grid-template-columns: 28px 1fr 1fr 2fr; gap: 6px; font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--border); color: var(--text2); }
  .set-log-row:last-child { border-bottom: none; }
  .set-log-row .val { color: var(--text); font-weight: 500; }

  /* DAY CHIPS */
  .day-select-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 20px; }
  .day-chip { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 4px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; transition: all 0.15s; min-height: 56px; }
  .day-chip .day-letter { font-size: 12px; font-weight: 700; color: var(--text2); }
  .day-chip .day-dot { width: 6px; height: 6px; border-radius: 50%; background: transparent; margin-top: 4px; }
  .day-chip.training .day-dot { background: var(--accent); }
  .day-chip.selected { background: var(--accent); border-color: var(--accent); }
  .day-chip.selected .day-letter { color: #fff; }
  .day-chip.selected .day-dot { background: rgba(255,255,255,0.7); }

  /* PLAN EDIT */
  .plan-day-card .day-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); margin-bottom: 2px; }
  .plan-day-card .day-type { font-size: 15px; font-weight: 600; }
  .edit-mode-toggle { font-size: 14px; font-weight: 600; color: var(--accent); background: none; border: none; cursor: pointer; padding: 4px 0; }
  .exercise-edit-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
  .exercise-edit-row input { flex: 1; font-size: 15px; padding: 8px 10px; }

  /* SEARCH / FILTER */
  .search-bar { position: relative; margin-bottom: 16px; }
  .search-bar input { padding-left: 40px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); pointer-events: none; }
  .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--surface); font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* EMPTY */
  .empty { text-align: center; padding: 48px 24px; color: var(--text2); }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  /* LOG */
  .log-exercise-card { margin-bottom: 16px; }
  .log-exercise-card .ex-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .set-header-row { display: grid; grid-template-columns: 32px 1fr 1fr 1fr 36px; gap: 6px; margin-bottom: 6px; }
  .set-header-row span { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); text-align: center; }
  .prev-hint { font-size: 12px; color: var(--text2); margin-top: -4px; margin-bottom: 8px; padding-left: 38px; }
  .save-bar { position: sticky; bottom: 0; padding: 12px 0 0; background: linear-gradient(transparent, var(--bg) 40%); margin-top: 8px; }

  /* CHEVRON */
  .chevron { display: inline-block; width: 20px; height: 20px; transition: transform 0.2s; flex-shrink: 0; }
  .chevron.open { transform: rotate(180deg); }

  /* ADD EX ROW */
  .add-exercise-row { display: flex; gap: 6px; margin-top: 8px; }
  .add-exercise-row input { flex: 1; }

  /* TOGGLE SWITCH */
  .toggle-wrap { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; margin-bottom: 12px; }
  .toggle-wrap label { font-size: 15px; font-weight: 500; color: var(--text); margin: 0; }
  .toggle { position: relative; display: inline-block; width: 48px; height: 28px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track { position: absolute; cursor: pointer; inset: 0; border-radius: 14px; background: var(--border); transition: .3s; }
  .toggle-track:before { position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .3s; }
  .toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle input:checked + .toggle-track:before { transform: translateX(20px); }

  /* MISC */
  .row { display: flex; gap: 8px; align-items: center; }
  .mt8 { margin-top: 8px; }
  .mt12 { margin-top: 12px; }
  .mt16 { margin-top: 16px; }
  .text-sm { font-size: 14px; }
  .text-xs { font-size: 12px; }
  .text-muted { color: var(--text2); }
  .fw600 { font-weight: 600; }

  /* TOAST */
  #toast {
    position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text); color: var(--bg); padding: 10px 20px;
    border-radius: 20px; font-size: 14px; font-weight: 500;
    opacity: 0; transition: opacity 0.3s, transform 0.3s;
    pointer-events: none; z-index: 300; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <div id="screen-plan" class="screen active">
    <div class="screen-header">
      <h1>Weekly Plan</h1>
      <p>Your default training schedule</p>
    </div>
    <div id="plan-content"></div>
  </div>

  <div id="screen-log" class="screen">
    <div class="screen-header">
      <h1>Log Session</h1>
      <p>Record today's workout</p>
    </div>
    <div id="log-content"></div>
  </div>

  <div id="screen-history" class="screen">
    <div class="screen-header">
      <h1>History</h1>
      <p>All past sessions</p>
    </div>
    <div id="history-content"></div>
  </div>

  <nav id="nav">
    <button class="nav-btn active" onclick="showScreen('plan')" id="nav-plan">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Plan
    </button>
    <button class="nav-btn" onclick="showScreen('log')" id="nav-log">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 5v5l3 3"/></svg>
      Log
    </button>
    <button class="nav-btn" onclick="showScreen('history')" id="nav-history">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      History
    </button>
  </nav>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
// STORAGE — safe wrappers around localStorage
// ─────────────────────────────────────────────

var memoryStore = {};

function lsGet(key) {
  try { return localStorage.getItem(key); }
  catch(e) { return memoryStore[key] || null; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, val); }
  catch(e) { memoryStore[key] = val; }
}

// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────

var DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
var DAY_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

var DEFAULT_PLAN = {
  Monday:    { rest: true,  cardio: '', label: 'Rest', exercises: [] },
  Tuesday:   { rest: false, cardio: 'Intervals', label: 'Upper Push', exercises: ['Chest press machine','Shoulder press machine','Cable chest fly','Tricep pushdown','Cable lateral raise'] },
  Wednesday: { rest: false, cardio: 'Steady state', label: 'Lower Body', exercises: ['Leg press','Leg curl','Leg extension','Hip abductor machine','Seated calf raises'] },
  Thursday:  { rest: false, cardio: 'Intervals', label: 'Upper Pull', exercises: ['Lat pulldown','Seated cable row','Face pulls','Cable rear delt fly','Bicep curl'] },
  Friday:    { rest: true,  cardio: '', label: 'Rest', exercises: [] },
  Saturday:  { rest: true,  cardio: '', label: 'Rest', exercises: [] },
  Sunday:    { rest: false, cardio: 'Steady state', label: 'Full Body + Core', exercises: ['Compound machine of choice','Dead bugs','Plank variations','Pallof press','Hanging leg raises'] }
};

// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────

function getPlan() {
  var stored = lsGet('gymPlan');
  if (stored) {
    try {
      var plan = JSON.parse(stored);
      // ensure all days exist
      DAYS.forEach(function(d) {
        if (!plan[d]) plan[d] = JSON.parse(JSON.stringify(DEFAULT_PLAN[d]));
        if (plan[d].label === undefined) plan[d].label = DEFAULT_PLAN[d] ? DEFAULT_PLAN[d].label : '';
      });
      return plan;
    } catch(e) {}
  }
  return JSON.parse(JSON.stringify(DEFAULT_PLAN));
}

function writePlan(plan) {
  lsSet('gymPlan', JSON.stringify(plan));
}

function getAllSessions() {
  var stored = lsGet('gymSessions');
  if (stored) {
    try { return JSON.parse(stored); } catch(e) {}
  }
  return [];
}

function writeSession(session) {
  var sessions = getAllSessions();
  sessions.push(session);
  lsSet('gymSessions', JSON.stringify(sessions));
}

function getLastSetsForExercise(name) {
  var sessions = getAllSessions();
  for (var i = sessions.length - 1; i >= 0; i--) {
    var ex = sessions[i].exercises.filter(function(e) {
      return e.name.toLowerCase() === name.toLowerCase();
    })[0];
    if (ex && ex.sets.length > 0) return ex.sets;
  }
  return null;
}

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────

var currentScreen = 'plan';

function showScreen(name) {
  ['plan','log','history'].forEach(function(s) {
    document.getElementById('screen-' + s).classList.toggle('active', s === name);
    document.getElementById('nav-' + s).classList.toggle('active', s === name);
  });
  currentScreen = name;
  if (name === 'plan') renderPlan();
  if (name === 'log') renderLog();
  if (name === 'history') renderHistory();
}

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────

var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2200);
}

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────

function esc(str) {
  if (!str && str !== 0) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function todayName() {
  var d = new Date().getDay(); // 0=Sun
  return DAYS[d === 0 ? 6 : d - 1];
}

// ─────────────────────────────────────────────
// SCREEN 1 — PLAN
// ─────────────────────────────────────────────

var planEditMode = {};

function renderPlan() {
  var plan = getPlan();
  var c = document.getElementById('plan-content');
  var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">'
    + '<span style="font-size:14px;color:var(--text2);">Tap a day to expand or edit</span>'
    + '<button class="edit-mode-toggle" onclick="toggleAllEdit()">Edit All</button>'
    + '</div>';

  DAYS.forEach(function(day) {
    var d = plan[day];
    var isEdit = !!planEditMode[day];
    var label = d.label || (d.rest ? 'Rest' : 'Training');

    html += '<div class="card plan-day-card" id="pcard-' + day + '">';
    html += '<div class="card-header" onclick="toggleDayEdit(\'' + day + '\')" style="cursor:pointer;">';
    html += '<div><div class="day-label">' + day + '</div>';
    html += '<div class="day-type">' + (d.rest ? '<span class="badge badge-rest">Rest</span>' : esc(label)) + '</div>';
    if (!d.rest && d.cardio) html += '<div style="font-size:12px;color:var(--text2);margin-top:3px;">Cardio: ' + esc(d.cardio) + '</div>';
    html += '</div>';
    html += '<div style="display:flex;align-items:center;gap:8px;">';
    if (!d.rest) html += '<span class="badge">' + d.exercises.length + ' ex</span>';
    html += '<svg class="chevron ' + (isEdit ? 'open' : '') + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text2)"><polyline points="6 9 12 15 18 9"/></svg>';
    html += '</div></div>';

    if (isEdit) {
      html += '<div class="divider"></div>';

      // Rest toggle
      html += '<div class="toggle-wrap"><label>Rest day</label>'
        + '<label class="toggle"><input type="checkbox" ' + (d.rest ? 'checked' : '') + ' onchange="toggleRest(\'' + day + '\',this.checked)">'
        + '<span class="toggle-track"></span></label></div>';

      if (!d.rest) {
        html += '<div style="margin-bottom:10px;"><label>Session label</label>'
          + '<input type="text" value="' + esc(label) + '" placeholder="e.g. Upper Push" oninput="updateLabel(\'' + day + '\',this.value)"></div>';

        html += '<div style="margin-bottom:12px;"><label>Cardio note</label>'
          + '<input type="text" value="' + esc(d.cardio || '') + '" placeholder="e.g. Intervals / Steady state" oninput="updateCardio(\'' + day + '\',this.value)"></div>';

        html += '<label>Exercises</label><div id="exlist-' + day + '" style="margin-top:6px;">';
        d.exercises.forEach(function(ex, i) {
          html += '<div class="exercise-edit-row">'
            + '<input type="text" value="' + esc(ex) + '" placeholder="Exercise name" oninput="updateEx(\'' + day + '\',' + i + ',this.value)">'
            + '<button class="btn-icon" onclick="removeEx(\'' + day + '\',' + i + ')" style="color:var(--danger);background:var(--danger-light);border:none;">✕</button>'
            + '</div>';
        });
        html += '</div>';
        html += '<div class="add-exercise-row">'
          + '<input type="text" id="newex-' + day + '" placeholder="Add exercise…" onkeydown="if(event.key===\'Enter\')addEx(\'' + day + '\')">'
          + '<button class="btn btn-secondary" style="flex-shrink:0;white-space:nowrap;" onclick="addEx(\'' + day + '\')">+ Add</button>'
          + '</div>';
      }
    } else if (!d.rest && d.exercises.length > 0) {
      html += '<div class="divider"></div><div class="tag-row">';
      d.exercises.forEach(function(ex) { html += '<span class="tag">' + esc(ex) + '</span>'; });
      html += '</div>';
    }

    html += '</div>';
  });

  c.innerHTML = html;
}

function toggleDayEdit(day) {
  planEditMode[day] = !planEditMode[day];
  renderPlan();
  if (planEditMode[day]) {
    setTimeout(function() {
      var card = document.getElementById('pcard-' + day);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 60);
  }
}

function toggleAllEdit() {
  var anyOpen = Object.keys(planEditMode).some(function(k) { return planEditMode[k]; });
  DAYS.forEach(function(d) { planEditMode[d] = !anyOpen; });
  renderPlan();
}

function toggleRest(day, val) {
  var plan = getPlan();
  plan[day].rest = val;
  if (val) { plan[day].exercises = []; plan[day].cardio = ''; plan[day].label = 'Rest'; }
  writePlan(plan);
  planEditMode[day] = true;
  renderPlan();
}

function updateLabel(day, val) {
  var plan = getPlan(); plan[day].label = val; writePlan(plan);
}
function updateCardio(day, val) {
  var plan = getPlan(); plan[day].cardio = val; writePlan(plan);
}
function updateEx(day, idx, val) {
  var plan = getPlan(); plan[day].exercises[idx] = val; writePlan(plan);
}
function removeEx(day, idx) {
  var plan = getPlan(); plan[day].exercises.splice(idx, 1); writePlan(plan);
  planEditMode[day] = true; renderPlan();
}
function addEx(day) {
  var input = document.getElementById('newex-' + day);
  var val = input.value.trim();
  if (!val) return;
  var plan = getPlan(); plan[day].exercises.push(val); writePlan(plan);
  input.value = '';
  planEditMode[day] = true; renderPlan();
}

// ─────────────────────────────────────────────
// SCREEN 2 — LOG SESSION
// ─────────────────────────────────────────────

var logState = { selectedDay: null, exercises: [] };

function renderLog() {
  var plan = getPlan();
  var c = document.getElementById('log-content');
  var today = todayName();

  if (!logState.selectedDay && plan[today] && !plan[today].rest) {
    logState.selectedDay = today;
    logState.exercises = plan[today].exercises.map(function(name) {
      return { name: name, sets: [{ weight: '', reps: '', note: '' }] };
    });
  }

  var html = '<div class="day-select-grid">';
  DAYS.forEach(function(day, i) {
    var d = plan[day];
    var sel = logState.selectedDay === day;
    var training = !d.rest;
    html += '<div class="day-chip ' + (training ? 'training' : '') + (sel ? ' selected' : '') + '" onclick="selectDay(\'' + day + '\')">'
      + '<span class="day-letter">' + DAY_SHORT[i] + '</span>'
      + '<span class="day-dot"></span></div>';
  });
  html += '</div>';

  if (!logState.selectedDay) {
    html += '<div class="empty"><div class="icon">👆</div><p>Select a training day above</p></div>';
    c.innerHTML = html; return;
  }

  var sd = plan[logState.selectedDay];
  html += '<div class="card" style="margin-bottom:16px;">'
    + '<div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);">' + logState.selectedDay + '</div>'
    + '<div style="font-size:17px;font-weight:700;margin-top:2px;">' + esc(sd.label || logState.selectedDay) + '</div>'
    + (sd.cardio ? '<div style="font-size:14px;color:var(--text2);margin-top:4px);">🏃 Cardio: ' + esc(sd.cardio) + '</div>' : '')
    + '</div>';

  if (logState.exercises.length === 0) {
    html += '<div class="empty"><div class="icon">💪</div><p>No exercises loaded.</p></div>';
  } else {
    logState.exercises.forEach(function(ex, ei) {
      var prev = getLastSetsForExercise(ex.name);
      html += '<div class="card log-exercise-card">'
        + '<div class="ex-header"><h3>' + esc(ex.name) + '</h3>'
        + '<button class="btn-icon" style="color:var(--danger);background:var(--danger-light);border:none;" onclick="removeLogEx(' + ei + ')">✕</button></div>';

      if (prev) {
        var prevStr = prev.map(function(s) { return (s.weight||'?') + 'kg×' + (s.reps||'?'); }).join(', ');
        html += '<div class="prev-hint">Last: ' + esc(prevStr) + '</div>';
      }

      html += '<div class="set-header-row"><span>#</span><span>kg</span><span>Reps</span><span style="text-align:left">Note</span><span></span></div>';

      ex.sets.forEach(function(set, si) {
        html += '<div class="set-row">'
          + '<span class="set-num">' + (si+1) + '</span>'
          + '<input type="number" inputmode="decimal" placeholder="0" value="' + esc(set.weight) + '" min="0" step="0.5" onchange="updateSet(' + ei + ',' + si + ',\'weight\',this.value)">'
          + '<input type="number" inputmode="numeric" placeholder="0" value="' + esc(set.reps) + '" min="0" onchange="updateSet(' + ei + ',' + si + ',\'reps\',this.value)">'
          + '<input type="text" class="note-input" placeholder="note…" value="' + esc(set.note||'') + '" oninput="updateSet(' + ei + ',' + si + ',\'note\',this.value)">'
          + '<button class="btn-icon" onclick="removeSet(' + ei + ',' + si + ')">−</button>'
          + '</div>';
      });

      html += '<button class="btn btn-ghost" onclick="addSet(' + ei + ')">+ Add set</button></div>';
    });
  }

  html += '<div class="card" style="margin-top:4px;">'
    + '<div style="font-size:14px;font-weight:600;margin-bottom:8px;">Add exercise</div>'
    + '<div class="add-exercise-row">'
    + '<input type="text" id="customex" placeholder="Exercise name…" onkeydown="if(event.key===\'Enter\')addCustomEx()">'
    + '<button class="btn btn-secondary" style="flex-shrink:0;" onclick="addCustomEx()">+ Add</button>'
    + '</div></div>';

  html += '<div class="save-bar">'
    + '<button class="btn btn-primary btn-full" onclick="doSaveSession()" style="font-size:16px;height:52px;">💾 Save Session</button>'
    + '</div>';

  c.innerHTML = html;
}

function selectDay(day) {
  var plan = getPlan();
  if (plan[day].rest) { showToast('Rest day — no exercises'); return; }
  logState.selectedDay = day;
  logState.exercises = plan[day].exercises.map(function(name) {
    return { name: name, sets: [{ weight: '', reps: '', note: '' }] };
  });
  renderLog();
}

function addSet(ei) {
  logState.exercises[ei].sets.push({ weight: '', reps: '', note: '' });
  renderLog();
  setTimeout(function() {
    var cards = document.querySelectorAll('.log-exercise-card');
    if (cards[ei]) cards[ei].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 30);
}

function removeSet(ei, si) {
  if (logState.exercises[ei].sets.length <= 1) { showToast('Need at least one set'); return; }
  logState.exercises[ei].sets.splice(si, 1);
  renderLog();
}

function updateSet(ei, si, field, val) {
  logState.exercises[ei].sets[si][field] = val;
}

function removeLogEx(ei) {
  logState.exercises.splice(ei, 1);
  renderLog();
}

function addCustomEx() {
  var input = document.getElementById('customex');
  if (!input) return;
  var val = input.value.trim();
  if (!val) return;
  logState.exercises.push({ name: val, sets: [{ weight: '', reps: '', note: '' }] });
  input.value = '';
  renderLog();
  setTimeout(function() {
    var cards = document.querySelectorAll('.log-exercise-card');
    if (cards.length) cards[cards.length-1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 30);
}

function doSaveSession() {
  if (!logState.selectedDay) { showToast('No day selected'); return; }
  var plan = getPlan();
  var sd = plan[logState.selectedDay];

  var exercises = logState.exercises.map(function(ex) {
    return { name: ex.name, sets: ex.sets.filter(function(s) { return s.weight !== '' || s.reps !== ''; }) };
  }).filter(function(ex) { return ex.sets.length > 0; });

  if (exercises.length === 0) { showToast('Log at least one set first'); return; }

  var now = new Date();
  var session = {
    id: Date.now(),
    date: now.toISOString(),
    day: logState.selectedDay,
    label: sd.label || logState.selectedDay,
    cardio: sd.cardio || '',
    exercises: exercises
  };

  writeSession(session);
  showToast('Session saved ✓');
  logState.selectedDay = null;
  logState.exercises = [];
  renderLog();
}

// ─────────────────────────────────────────────
// SCREEN 3 — HISTORY
// ─────────────────────────────────────────────

var historyOpenIds = {};
var historyFilter = 'all';
var historySearch = '';

function renderHistory() {
  var c = document.getElementById('history-content');
  var sessions = getAllSessions().slice().reverse();
  var plan = getPlan();

  var allDays = [];
  sessions.forEach(function(s) { if (allDays.indexOf(s.day) === -1) allDays.push(s.day); });

  if (historyFilter !== 'all') {
    sessions = sessions.filter(function(s) { return s.day === historyFilter; });
  }
  if (historySearch.trim()) {
    var q = historySearch.toLowerCase();
    sessions = sessions.filter(function(s) {
      return s.day.toLowerCase().indexOf(q) !== -1
        || (s.label||'').toLowerCase().indexOf(q) !== -1
        || s.exercises.some(function(e) { return e.name.toLowerCase().indexOf(q) !== -1; });
    });
  }

  var html = '<div class="search-bar">'
    + '<span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>'
    + '<input type="search" placeholder="Search sessions or exercises…" value="' + esc(historySearch) + '" oninput="historySearch=this.value;renderHistory()">'
    + '</div>';

  html += '<div class="filter-row"><div class="filter-chip ' + (historyFilter==='all'?'active':'') + '" onclick="setFilter(\'all\')">All</div>';
  DAYS.filter(function(d) { return allDays.indexOf(d) !== -1; }).forEach(function(day) {
    var lbl = (plan[day] && plan[day].label) ? plan[day].label : day;
    html += '<div class="filter-chip ' + (historyFilter===day?'active':'') + '" onclick="setFilter(\'' + day + '\')">' + esc(lbl) + '</div>';
  });
  html += '</div>';

  if (sessions.length === 0) {
    html += '<div class="empty"><div class="icon">📋</div><p>No sessions recorded yet</p></div>';
    c.innerHTML = html; return;
  }

  sessions.forEach(function(s) {
    var d = new Date(s.date);
    var dateStr = d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
    var timeStr = d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    var isOpen = !!historyOpenIds[s.id];
    var totalSets = s.exercises.reduce(function(n, e) { return n + e.sets.length; }, 0);

    html += '<div class="card history-item" onclick="toggleHistory(' + s.id + ')">'
      + '<div class="card-header">'
      + '<div style="flex:1;min-width:0;">'
      + '<div style="font-size:15px;font-weight:700;">' + esc(s.label || s.day) + '</div>'
      + '<div style="font-size:13px;color:var(--text2);margin-top:3px;">' + dateStr + ' · ' + timeStr + '</div>'
      + '<div style="font-size:13px;color:var(--text2);margin-top:2px;">' + s.exercises.length + ' exercise' + (s.exercises.length!==1?'s':'') + ' · ' + totalSets + ' sets' + (s.cardio ? ' · 🏃 ' + esc(s.cardio) : '') + '</div>'
      + '</div>'
      + '<svg class="chevron ' + (isOpen?'open':'') + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text2)"><polyline points="6 9 12 15 18 9"/></svg>'
      + '</div>';

    if (isOpen) {
      html += '<div class="history-detail open"><div class="divider"></div>';
      s.exercises.forEach(function(ex) {
        html += '<div class="exercise-block"><h4>' + esc(ex.name) + '</h4>'
          + '<div class="set-log-row" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">'
          + '<span>#</span><span>Weight</span><span>Reps</span><span>Note</span></div>';
        ex.sets.forEach(function(set, si) {
          html += '<div class="set-log-row">'
            + '<span>' + (si+1) + '</span>'
            + '<span class="val">' + (set.weight ? set.weight+'kg' : '—') + '</span>'
            + '<span class="val">' + (set.reps || '—') + '</span>'
            + '<span class="val" style="font-size:12px;">' + esc(set.note||'') + '</span>'
            + '</div>';
        });
        html += '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
  });

  c.innerHTML = html;
}

function toggleHistory(id) {
  historyOpenIds[id] = !historyOpenIds[id];
  renderHistory();
}

function setFilter(day) {
  historyFilter = day;
  renderHistory();
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────

// Seed plan if first run
(function() {
  if (!lsGet('gymPlan')) {
    writePlan(JSON.parse(JSON.stringify(DEFAULT_PLAN)));
  }
})();

renderPlan();
</script>
